<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RedVote - Onchain Voting</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <h1>RedVote</h1>
    <p class="tagline">A simple on-chain voting platform (one wallet, one vote)</p>
  </header>

  <main class="container">
    <section class="panel">
      <div class="row">
        <button id="connectButton" class="primary">Connect Wallet</button>
        <div id="account" class="account">Not connected</div>
      </div>

      <div id="status" class="status" role="status" aria-live="polite"></div>

      <div id="candidates" class="candidates"></div>

      <div id="footer" class="footer">
        <p>
          To use this app:
          <ol>
            <li>Start Ganache on <code>http://localhost:8545</code></li>
            <li>Run <code>npm run deploy</code> to deploy the voting contract</li>
            <li>Open this page in a browser that has MetaMask connected to localhost</li>
          </ol>
        </p>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
